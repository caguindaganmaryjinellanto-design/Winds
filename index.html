<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Diary | Home</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: system-ui, -apple-system, sans-serif; 
        }

        body {
            /* Uses the verbatim filename provided */
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('banner.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #4b3621; 
            padding: 15px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .logo {
            width: 80px;
            height: auto;
            border-radius: 8px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s ease;
        }

        nav a:hover { 
            color: #d2b48c; 
        }

        section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .welcome-container {
            max-width: 800px;
            background: rgba(75, 54, 33, 0.6);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 {
            font-size: clamp(32px, 8vw, 70px);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            border-bottom: 5px solid white;
            display: inline-block;
        }

        h3 {
            font-size: 24px;
            font-style: italic;
            margin: 20px 0;
            color: #d2b48c;
        }

        p {
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            header { padding: 15px 20px; flex-direction: column; gap: 15px; }
            nav a { margin: 0 10px; font-size: 16px; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html">
        <img src="CDLOGO.png" alt="Logo" class="logo">
    </a>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="diary.html">Diary</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section>
    <div class="welcome-container">
        <h2>Hello There!</h2>
        <h3>Welcome to my College Diary</h3>
        <p>Explore my journey through the world of IT. This diary captures the hardships, the breakthroughs, and everything in between. Glad you're here!</p>
    </div>
</section>

</body>
</html>
