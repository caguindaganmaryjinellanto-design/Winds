<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Diary</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; 
        }

        body {
            /* Adjusted the linear-gradient to use valid RGBA values for a clean overlay */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('images/banner.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(1px);
        }

        header {
            background-color: #4b3621; 
            padding: 15px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .logo {
            width: 80px; /* Adjusted size for better visibility */
            height: auto;
            display: block;
            border-radius: 8px; /* Optional: gives the logo a clean edge */
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s ease;
        }

        nav a:hover { 
            color: #80755a; 
            text-decoration: underline; 
        }

        section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .welcome-container {
            max-width: 800px;
            background: rgba(75, 54, 33, 0.4); /* Subtle background for text readability */
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        h2 {
            font-size: clamp(40px, 10vw, 80px); /* Makes text responsive on mobile */
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            border-bottom: 8px solid white;
            display: inline-block;
        }

        h3 {
            font-size: 28px;
            font-style: italic;
            margin: 20px 0;
        }

        p {
            font-size: 22px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<header>
    <!-- Pointed the src directly to your uploaded logo file -->
  <a href="CSTA Campus Entrance.html">
        <img src="CDLOGO.png" alt="College Diary Logo" class="logo">
    </a>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="diary.html">Diary</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section>
    <div class="welcome-container">
        <h2>Hello There!</h2>
        <h3>Welcome to my College Diary!</h3>
        <p>Explore my journey through the world of IT. This diary captures the hardships, the breakthroughs, and everything in between. Glad you're here!</p>
    </div>
</section>

</body>
</html>
