<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <style>
        /* Base Styles */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; 
        }

        body {
            /* Using your preferred color palette: Maroon, Black, and Gray */
            background-color: #3C2A21; 
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('images/nikowl.jpg');
            background-size: cover;
            background-attachment: fixed;
            backdrop-filter: blur(5px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #4b3621; 
            color: white;
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bolder;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover { color: #80755a; text-decoration: underline; }

        section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* Container Fix: Matches your border-style and shadow preferences */
        .contact-container {
            max-width: 600px;
            background-color: #4b3621; 
            border: 4px solid white;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            text-align: center;
            filter: drop-shadow(12px 12px 0px #1a110d);
        }

        h2 {
            color: white;
            font-size: clamp(30px, 8vw, 60px); /* Responsive font size */
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 30px;
            border-bottom: 6px solid white;
            display: inline-block;
        }

        /* Item Styling: Stacked layout for icons and text */
        .contact-item {
            display: flex;
            flex-direction: column; 
            align-items: center;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 20px;
            margin: 15px auto;
            width: 90%;
            border-radius: 10px;
            transition: 0.3s ease;
        }

        .contact-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: white;
            transform: translateY(-5px);
        }

        .mini-icon {
            width: 45px;
            height: 45px;
            margin-bottom: 10px;
            object-fit: contain;
        }

        .contact-text strong {
            display: block;
            color: #cccccc;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-text p {
            color: white;
            font-size: 1.2rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Contact</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="diary.html">Diary</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section>
        <div class="contact-container">
            <h2>Get in Touch</h2>
            
            <!-- Facebook -->
            <a href="https://www.facebook.com/itswindel.santiago" class="contact-item" target="_blank">
                <img src="facebook.avif" alt="Facebook" class="mini-icon">
                <div class="contact-text">
                    <strong>Facebook</strong>
                    <p>Windel Santiago</p>
                </div>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/_wwinds_/" class="contact-item" target="_blank">
                <img src="instagram.webp" alt="Instagram" class="mini-icon">
                <div class="contact-text">
                    <strong>Instagram</strong>
                    <p>_wwinds_</p>
                </div>
            </a>

            <!-- Email -->
            <a href="mailto:windelselma@gmail.com" class="contact-item">
                <img src="gmail.avif" alt="Email" class="mini-icon">
                <div class="contact-text">
                    <strong>Email</strong>
                    <p>windelselma@gmail.com</p>
                </div>
            </a>

            <!-- Phone -->
            <a href="tel:0961034594" class="contact-item">
                <img src="call logo.png" alt="Phone" class="mini-icon">
                <div class="contact-text">
                    <strong>Phone</strong>
                    <p>0961034594</p>
                </div>
            </a>
        </div>
    </section>

</body>
</html>
