<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSTA Campus Entrance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .entrance-container {
            width: 100vw;
            height: 100vh;
            cursor: pointer;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* DEFAULT: Laptop view (Full Cover) */
        .entrance-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
            transition: opacity 0.5s ease, transform 0.8s ease;
        }

        /* Overlay Text Styling */
        .overlay-text {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: "Times New Roman", Times, serif;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.9);
            letter-spacing: 4px;
            pointer-events: none; 
            text-transform: uppercase;
            border: 2px solid white;
            padding: 15px 30px;
            background: rgba(128, 0, 0, 0.4); 
            transition: 0.3s;
            white-space: nowrap;
            z-index: 10;
        }

        .entrance-container:hover .overlay-text {
            background: rgba(128, 0, 0, 0.8);
            letter-spacing: 6px;
        }

        /* --- MOBILE PHONE SETTINGS --- */
        @media (max-width: 600px) {
            
            /* CHOICE A: Fully fill the screen (may crop sides) */
            .entrance-container img {
                object-fit: cover; 
                /* object-fit: contain; <--- UNCOMMENT THIS TO USE CHOICE B */
            }

            /* CHOICE B: Show full picture (Half-display style with bars) */
            /* If you want Choice B, change 'cover' to 'contain' above */

            .overlay-text {
                font-size: 18px; /* Smaller text for phone */
                padding: 10px 20px;
                letter-spacing: 2px;
                bottom: 20%; /* Lifted higher for phone navigation */
            }
        }
    </style>
</head>
<body>

    <div class="entrance-container" onclick="location.href='index.html'">
        <img src="CSTA.jpg" alt="CSTA Campus Entrance">
        <div class="overlay-text">Click to Enter Profile</div>
    </div>

</body>
</html>
